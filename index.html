<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Namaz Tracker Pro Max</title>

<!-- PERFECT MOBILE SCALING -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">

<h1>🌙 Namaz Tracker</h1>

<div id="dateDisplay" class="date-box"></div>

<div class="progress-section">
    <h3>Monthly Progress</h3>
    <div class="progress-bar">
        <div id="progressFill"></div>
    </div>
    <p id="progressText"></p>
    <h3>Total Qaza: <span id="qazaCount">0</span></h3>
</div>

<div id="prayerContainer"></div>

<button onclick="showHistory()">View History</button>

<div id="historySection" class="history"></div>

<canvas id="prayerChart"></canvas>

</div>

<footer class="creator-footer">
    Created by <span class="creator-name">Ans Riaz</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="chart.js"></script>
<script src="script.js"></script>

</body>
</html>
